# Triggers only on v* tag push (e.g. v1.0.0).
# If tag push doesn't trigger: the workflow must exist in the commit the tag points to.
# Fix: ensure workflow is on main, then re-tag: git tag -f v1.0.0 && git push origin v1.0.0 -f
name: Build and Push to GitHub Container Registry

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Ref to build (branch or tag, e.g. main or v1.0.0)'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Get package version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            TAG_VERSION=${GITHUB_REF#refs/tags/v}
            if [ "$VERSION" != "$TAG_VERSION" ]; then
              echo "::error::Tag v$TAG_VERSION does not match package.json version $VERSION"
              exit 1
            fi
          fi
          # Generate semver-style tags (1.0.0, 1.0, 1)
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "major=$MAJOR" >> $GITHUB_OUTPUT
          echo "minor=$MINOR" >> $GITHUB_OUTPUT
          echo "Building repix version $VERSION"

      - name: Set Docker tags
        id: tags
        run: |
          IMAGE="ghcr.io/${{ github.repository }}"
          VERSION="${{ steps.version.outputs.version }}"
          MAJOR="${{ steps.version.outputs.major }}"
          MINOR="${{ steps.version.outputs.minor }}"
          TAGS="${IMAGE}:${VERSION},${IMAGE}:${MAJOR}.${MINOR},${IMAGE}:${MAJOR},${IMAGE}:latest"
          echo "tags=${TAGS}" >> $GITHUB_OUTPUT

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
